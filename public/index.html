<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="robots" content="noindex">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Trades Martin">
        <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="style.css">
        <title>Trades Martin</title>
    </head>
    <body>
        <main>

            <!-- ── Total P&L ── -->
            <div class="pnl-total">
                <p class="pnl-total__label">Profit / Perte total</p>
                <p class="summary__amount" id="totalPnl">—</p>
                <p class="pnl-total__time" id="totalTime">Chargement…</p>
            </div>

            <!-- ── Position cards ── -->
            <div class="positions">

                <article class="card" id="cardBrent">
                    <div class="card__head">
                        <h2 class="card__name">Brent</h2>
                        <span class="badge badge--long">LONG</span>
                    </div>
                    <dl class="card__prices">
                        <div>
                            <dt>Entrée</dt>
                            <dd>109 515,00 $</dd>
                        </div>
                        <div class="right">
                            <dt>Actuel</dt>
                            <dd class="live" id="brentPrice">—</dd>
                        </div>
                    </dl>
                    <div class="card__result">
                        <span class="result__label">Résultat</span>
                        <div class="result__values">
                            <span class="result__usd" id="brentPnl">—</span>
                            <span class="result__pct" id="brentPct"></span>
                        </div>
                    </div>
                </article>

                <article class="card" id="cardBtc">
                    <div class="card__head">
                        <h2 class="card__name">Bitcoin</h2>
                        <span class="badge badge--short">SHORT</span>
                    </div>
                    <dl class="card__prices">
                        <div>
                            <dt>Entrée</dt>
                            <dd>67 806,75 $</dd>
                        </div>
                        <div class="right">
                            <dt>Actuel</dt>
                            <dd class="live" id="btcPrice">—</dd>
                        </div>
                    </dl>
                    <div class="card__result">
                        <span class="result__label">Résultat</span>
                        <div class="result__values">
                            <span class="result__usd" id="btcPnl">—</span>
                            <span class="result__pct" id="btcPct"></span>
                        </div>
                    </div>
                </article>

            </div>

            <!-- ── Status bar ── -->
            <footer class="statusbar">
                <div class="statusbar__left">
                    <span class="dot" id="dot"></span>
                    <span id="statusTxt">Chargement…</span>
                </div>
                <span>Hyperliquid L1</span>
            </footer>

        </main>
        <script src="main.js"></script>
    </body>
</html>
