<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="robots" content="noindex">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Bootstrap">
        <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
        <link rel="icon" type="image/png" sizes="64x64" href="assets/icons/64.png">
        <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/16.png">
        <link rel="stylesheet" href="style.css">
        <title>Trades Martin</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <!-- ── Total P&L ── -->
            <header class="summary">
                <p class="summary__label">Profit / Perte total</p>
                <p class="summary__amount" id="totalPnl">—</p>
                <p class="summary__time" id="totalTime">Chargement…</p>
            </header>

            <!-- ── Position cards ── -->
            <section class="positions">
                <article class="card" id="cardBrent">
                    <header class="card__head">
                        <h2 class="card__name">Brent</h2>
                        <span class="badge badge--long">LONG</span>
                    </header>

                    <div class="card__prices">
                        <div class="price">
                            <span class="price__label">Entrée</span>
                            <span class="price__value">109 515,00 $</span>
                        </div>
                        <div class="price price--right">
                            <span class="price__label">Actuel</span>
                            <span
                                class="price__value price__value--live"
                                id="brentPrice"
                                >—</span
                            >
                        </div>
                    </div>

                    <footer class="card__result">
                        <span class="result__label">Résultat</span>
                        <div class="result__values">
                            <span class="result__usd" id="brentPnl">—</span>
                            <span class="result__pct" id="brentPct"></span>
                        </div>
                    </footer>
                </article>

                <article class="card" id="cardBtc">
                    <header class="card__head">
                        <h2 class="card__name">Bitcoin</h2>
                        <span class="badge badge--short">SHORT</span>
                    </header>

                    <div class="card__prices">
                        <div class="price">
                            <span class="price__label">Entrée</span>
                            <span class="price__value">67 806,75 $</span>
                        </div>
                        <div class="price price--right">
                            <span class="price__label">Actuel</span>
                            <span
                                class="price__value price__value--live"
                                id="btcPrice"
                                >—</span
                            >
                        </div>
                    </div>

                    <footer class="card__result">
                        <span class="result__label">Résultat</span>
                        <div class="result__values">
                            <span class="result__usd" id="btcPnl">—</span>
                            <span class="result__pct" id="btcPct"></span>
                        </div>
                    </footer>
                </article>
            </section>

            <!-- ── Status bar ── -->
            <footer class="statusbar">
                <div class="statusbar__left">
                    <span class="dot" id="dot"></span>
                    <span class="statusbar__text" id="statusTxt"
                        >Chargement…</span
                    >
                </div>
                <span class="statusbar__source">Hyperliquid L1</span>
            </footer>
        </main>

        <script src="main.js"></script>
    </body>
</html>
